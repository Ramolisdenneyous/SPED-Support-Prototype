services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sped
      POSTGRES_PASSWORD: sped
      POSTGRES_DB: sped_support
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sped -d sped_support"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://sped:sped@postgres:5432/sped_support
      DEMO_MODE: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

  simulator:
    profiles:
      - manual-simulator
    build:
      context: ./simulator
    environment:
      BACKEND_URL: http://backend:8000
      SIM_HEARTBEAT_SECONDS: 50
    depends_on:
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

volumes:
  postgres_data:
